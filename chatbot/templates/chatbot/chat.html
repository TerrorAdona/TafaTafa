{% extends "base.html" %}

{% block content %}
<div class="chat-container">
    <div class="chat-header bg-gradient-to-r from-primary to-primary-dark text-white px-6 py-4 flex justify-between items-center">
        <h1 class="flex items-center gap-3 text-xl font-semibold">
            <span class="text-[#bada55]">Tafa</span>Tafa
        </h1>
        <div class="auth-links text-sm flex items-center gap-2">
            {% if user.is_authenticated %}
                Bonjour, {{ user.username }}! <a href="{% url 'logout' %}" class="btn-disconnect hover:underline">Déconnexion</a>
            {% else %}
                <a href="{% url 'login' %}" class="hover:underline">Connexion</a> |
                <a href="{% url 'register' %}" class="hover:underline">Inscription</a>
            {% endif %}
        </div>
    </div>
    <div id="messages" class="flex-1 overflow-y-auto p-6 bg-gray-50 space-y-4">
        {# Messages will be injected by JavaScript #}
    </div>
    <div class="input-area flex p-6 bg-gray-100 border-t gap-3">
        <input type="text" id="message" placeholder="Posez votre question..." class="flex-1 min-h-[48px] px-5 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all duration-200 bg-white" />
        <button type="button" id="voiceBtn" class="bg-primary text-white px-4 py-3 rounded-xl font-medium hover:bg-primary-dark transition-all duration-200 flex items-center gap-2 ml-2" title="Entrée vocale">
            🎤
        </button>
        <button onclick="sendMessage()" class="bg-primary text-white px-6 py-3 rounded-xl font-medium hover:bg-primary-dark transition-all duration-200 flex items-center gap-2">
            Envoyer
        </button>
    </div>
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value.trim();
        if (!text) return;

        const messages = document.getElementById("messages");

        // Add user message
        const userMessageDiv = document.createElement('div');
        userMessageDiv.className = 'message user max-w-[85%] ms-auto p-4 bg-blue-50 text-blue-800 rounded-br-[6px] rounded-bl-[16px] rounded-tl-[16px] rounded-tr-[16px] animate-fadeIn';
        userMessageDiv.innerHTML = `<b>Vous :</b> ${text.replace(/\n/g, '<br>')}`;
        messages.appendChild(userMessageDiv);
        input.value = "";

        const formData = new FormData();
        formData.append("message", text);

        const response = await fetch("/api/chat/", {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: formData
        });

        const data = await response.json();

        // Create bot message container
        const botMessageDiv = document.createElement('div');
        botMessageDiv.className = 'message bot max-w-[85%] p-4 bg-white text-gray-800 rounded-bl-[6px] rounded-br-[16px] rounded-tl-[16px] rounded-tr-[16px] animate-fadeIn';
        botMessageDiv.innerHTML = '<b>TafaTafa :</b> ';

        // Create typewriter span
        const typewriterSpan = document.createElement('span');
        typewriterSpan.className = 'typewriter-text';
        botMessageDiv.appendChild(typewriterSpan);
        messages.appendChild(botMessageDiv);

        // Typewriter effect
        const answer = data.answer;
        let i = 0;

        function typeWriter() {
            if (i < answer.length) {
                const char = answer.charAt(i);
                if (char === '\n') {
                    // Add a line break for newlines
                    const br = document.createElement('br');
                    typewriterSpan.appendChild(br);
                } else if (char === '|') {
                    // Replace '|' with a line break and remove the character
                    const br = document.createElement('br');
                    typewriterSpan.appendChild(br);
                } else if (char === '_' || char === '*' || char === '`' || char === '~') {
                    // Remove common special characters used for markdown emphasis
                    // Skip displaying these characters
                } else {
                    // For other characters, append as text
                    typewriterSpan.textContent += char;
                }
                i++;
                setTimeout(typeWriter, 5);
            } else {
                // Scroll to bottom when done typing
                messages.scrollTop = messages.scrollHeight;
                // Remove the blinking cursor
                typewriterSpan.classList.add('finished');
            }
        }

        typeWriter();

        // Focus back on input after sending
        input.focus();
    }

    // Focus on input when page loads
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('message').focus();
    });

    // Handle Enter key
    document.getElementById('message').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // Voice recognition functionality - Direct and simple approach
    document.getElementById('voiceBtn').addEventListener('click', function() {
        const input = document.getElementById('message');
        const voiceButton = this;

        // Vérifier la disponibilité de l'API de reconnaissance vocale
        if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
            alert('Votre navigateur ne prend pas en charge la reconnaissance vocale. Veuillez utiliser Chrome ou un navigateur compatible.');
            return;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        // Configuration de la reconnaissance
        recognition.lang = 'fr-FR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // Gestion du début de la reconnaissance
        recognition.onstart = function() {
            voiceButton.style.backgroundColor = '#ff5722';
            voiceButton.title = 'Écoute en cours...';
            voiceButton.innerHTML = '🔴';
            input.placeholder = 'Parlez maintenant...';
        };

        // Gestion des résultats - La partie cruciale
        recognition.onresult = function(event) {
            // S'assurer qu'il y a bien un résultat
            if (event.results.length > 0) {
                // Prendre la transcription la plus probable
                const transcript = event.results[0][0].transcript;

                // Mettre directement dans le champ de saisie
                input.value = transcript;

                // S'assurer que le champ a le focus
                input.focus();

                // Forcer la mise à jour en déclençant les événements
                input.dispatchEvent(new Event('input', { bubbles: true }));
                input.dispatchEvent(new Event('change', { bubbles: true }));

                // Envoyer automatiquement le message après la saisie vocale
                sendMessage();
            }

            // Arrêter la reconnaissance après avoir reçu un résultat
            recognition.stop();
        };

        // Gestion de la fin
        recognition.onend = function() {
            voiceButton.style.backgroundColor = '';
            voiceButton.title = 'Entrée vocale';
            voiceButton.innerHTML = '🎤';
            input.placeholder = 'Posez votre question...';
        };

        // Gestion des erreurs
        recognition.onerror = function(event) {
            voiceButton.style.backgroundColor = '';
            voiceButton.title = 'Entrée vocale';
            voiceButton.innerHTML = '🎤';
            input.placeholder = 'Posez votre question...';

            let message = 'Erreur de reconnaissance vocale';
            if (event.error === 'not-allowed') {
                message = 'Permission du microphone refusée. Veuillez autoriser l\'accès au microphone dans votre navigateur.';
            } else if (event.error === 'audio-capture') {
                message = 'Aucun microphone détecté. Veuillez vérifier votre matériel.';
            } else if (event.error === 'not-supported') {
                message = 'Cette fonctionnalité n\'est pas supportée sur ce navigateur.';
            } else {
                message = 'Erreur de reconnaissance: ' + event.error;
            }
            alert(message);
        };

        // Démarrer la reconnaissance avec gestion d'erreur
        try {
            recognition.start();
        } catch (e) {
            voiceButton.style.backgroundColor = '';
            voiceButton.title = 'Entrée vocale';
            voiceButton.innerHTML = '🎤';
            input.placeholder = 'Posez votre question...';
            alert('Impossible de démarrer la reconnaissance vocale: ' + e.message);
        }
    });
</script>
<style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
        animation: fadeInUp 0.3s ease-out;
    }
</style>
{% endblock %}
