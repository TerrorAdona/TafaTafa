<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TafaTafaAI</title>
    <style>
        :root {
            --primary-color: #4a6cf7;
            --primary-dark: #3a56d4;
            --secondary-color: #f0f4ff;
            --user-bg: #e3f2fd;
            --bot-bg: #f5f5f5;
            --border-radius: 12px;
            --max-width: 800px;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: var(--max-width);
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(to right, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-header h1::before {
            content: "🤖";
            font-size: 1.8rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            word-wrap: break-word;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: var(--user-bg);
            color: #0d47a1;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--bot-bg);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message b {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #fafafa;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        #message {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #message:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .chat-header h1 {
                font-size: 1.5rem;
            }
            #messages {
                padding: 15px;
            }
            .input-area {
                padding: 10px;
            }
            #message, button {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
        }

        /* Scrollbar styling */
        #messages::-webkit-scrollbar {
            width: 8px;
        }
        #messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }
        #messages::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>TafaTafaAI</h1>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="Posez votre question...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function sendMessage() {
            const input = document.getElementById("message");
            const text = input.value.trim();
            if (!text) return;

            const messages = document.getElementById("messages");
            messages.innerHTML += `<div class="message user"><b>Vous :</b> ${text}</div>`;
            input.value = "";

            const formData = new FormData();
            formData.append("message", text);

            const response = await fetch("/api/chat/", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: formData
            });

            const data = await response.json();
            messages.innerHTML += `<div class="message bot"><b>TafaTafa :</b> ${data.answer}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
