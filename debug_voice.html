<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de reconnaissance vocale</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        #testBtn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #testBtn.recording {
            background-color: #f44336;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 50px;
        }
        .log {
            background-color: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Test de la reconnaissance vocale</h1>
    <button id="testBtn">Tester la reconnaissance vocale</button>
    <div id="output"></div>
    <div id="log"></div>

    <script>
        const testBtn = document.getElementById('testBtn');
        const output = document.getElementById('output');
        const logDiv = document.getElementById('log');

        function log(message) {
            console.log(message);
            logDiv.innerHTML += '<div class="log">[' + new Date().toLocaleTimeString() + '] ' + message + '</div>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        testBtn.addEventListener('click', function() {
            // Réinitialiser l'interface
            output.textContent = 'Test en cours...';
            testBtn.disabled = true;
            testBtn.textContent = 'Test en cours...';

            // Vérifier la disponibilité de la reconnaissance vocale
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                output.textContent = 'Votre navigateur ne supporte pas la reconnaissance vocale.';
                testBtn.disabled = false;
                testBtn.textContent = 'Tester la reconnaissance vocale';
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();

            log('Création de l\'objet SpeechRecognition');

            // Configuration
            recognition.lang = 'fr-FR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            log('Configuration: lang=fr-FR, interimResults=false, maxAlternatives=1');

            // Démarrer la reconnaissance
            try {
                recognition.start();
                log('Méthode start() appelée');
                testBtn.classList.add('recording');
                testBtn.textContent = 'Écoute en cours... Parlez maintenant';
            } catch (e) {
                log('Erreur lors du démarrage: ' + e.message);
                output.textContent = 'Erreur: ' + e.message;
                testBtn.disabled = false;
                testBtn.textContent = 'Tester la reconnaissance vocale';
                testBtn.classList.remove('recording');
                return;
            }

            // Gestion des résultats
            recognition.onresult = function(event) {
                log('Événement onresult reçu');
                log('Nombre de résultats: ' + event.results.length);

                if (event.results.length > 0) {
                    const transcript = event.results[0][0].transcript;
                    log('Transcription reçue: "' + transcript + '"');
                    output.textContent = 'Résultat: "' + transcript + '"';
                } else {
                    log('Aucun résultat dans event.results');
                    output.textContent = 'Aucun résultat reconnu';
                }

                // Arrêter après le résultat
                try {
                    recognition.stop();
                    log('Méthode stop() appelée après résultat');
                } catch (e) {
                    log('Erreur lors de l\'arrêt: ' + e.message);
                }
            };

            // Gestion de la fin
            recognition.onend = function() {
                log('Événement onend reçu');
                testBtn.classList.remove('recording');
                testBtn.disabled = false;
                testBtn.textContent = 'Tester la reconnaissance vocale';
            };

            // Gestion des erreurs
            recognition.onerror = function(event) {
                log('Erreur de reconnaissance: ' + event.error);
                output.textContent = 'Erreur: ' + event.error;
                testBtn.classList.remove('recording');
                testBtn.disabled = false;
                testBtn.textContent = 'Tester la reconnaissance vocale';
            };

            // Gestion du démarrage
            recognition.onstart = function() {
                log('Événement onstart reçu - reconnaissance démarrée');
            };
        });
    </script>
</body>
</html>
